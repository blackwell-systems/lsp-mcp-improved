name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install TypeScript language server
        run: npm install typescript-language-server typescript --save-dev

      - name: Run tests
        run: npm test

  multi-lang-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript
      - name: Install Pyright
        run: npm install -g pyright
      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest
      - name: Install Rust toolchain + rust-analyzer
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer
      - name: Install jdtls
        run: pip install jdtls
      - name: Run multi-language tests
        run: npm run test:multi-lang
