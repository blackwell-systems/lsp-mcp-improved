services:
  lsp-mcp:
    build: .
    volumes:
      # Mount your project directory. Read-write is required for code actions
      # that modify files (e.g. auto-imports, quick fixes).
      - ${WORKSPACE_DIR:-./workspace}:/workspace:rw
    stdin_open: true
    tty: true
    # Resource limits to prevent the language server from consuming too much memory.
    # Adjust based on project size. These apply with Docker Compose v2+ (non-Swarm).
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    environment:
      - NODE_OPTIONS=--max-old-space-size=3072
      - TSC_NONPOLLING_WATCHER=true
